name: playground
version: 1.0.0+1
publish_to: none
description: A new Flutter project.
environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  get: 4.6.6
  flutter:
    sdk: flutter
  google_fonts: ^4.0.5
  flutter_native_splash: ^2.4.1
  pin_code_fields: ^8.0.1
  internet_connection_checker: ^1.0.0+1
  connectivity_plus: ^5.0.2
  flutter_svg: ^2.0.10+1
  confetti: ^0.7.0
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  intl: ^0.17.0
  local_auth: ^2.3.0
  encrypt_shared_preferences: ^0.7.6
  uuid: ^4.5.0
  url_launcher: ^6.3.1
  firebase_messaging: ^15.1.3
  shared_preferences: ^2.3.2
  pay_with_paystack: ^1.0.10
  flutter_dotenv: ^5.2.1
  shimmer: ^3.0.0
  http: ^1.2.2
  webview_flutter: ^4.10.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.3.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_lints: 4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  branding: assets/images/branding.png
  branding_mode: bottom
  android: true
  ios: true
  web: false

  android_12:
    color: "#ffffff"
    icon_background_color: "#ffffff"
    image: assets/images/splash_12.png
    branding: assets/images/branding_12.png
